name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Telepítjük a Git-et és a Docker-t, ha véletlen nem lenne fent
            sudo apt-get update
            sudo apt-get install -y git docker.io docker-compose
            
            # 2. Letöltjük/Frissítjük a forráskódot a szerveren
            cd /app || git clone https://github.com/ABS0N/realestate.git /app
            cd /app
            git pull origin main
            
            # 3. Docker konténer újraindítása (Build és Run)
            # Megállítjuk a régit, ha futna
            sudo docker stop realestate-app || true
            sudo docker rm realestate-app || true
            
            # Felépítjük az új image-et a Dockerfile alapján
            sudo docker build -t realestate-app .
            
            # Elindítjuk az újat a 80-as porton (hogy ne kelljen :8080-at írni)
            sudo docker run -d --name realestate-app -p 80:8080 realestate-app