name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Belépünk a szerver mappájába
            cd /app || mkdir /app && cd /app
            
            # (Opcionális: Ha még nincs ott a kód, leklónozzuk, vagy csak másoljuk a JAR-t)
            # A legegyszerűbb módszer vizsgára: Docker image build helyben a szerveren
            # Ehhez a GitHub Action-nek át kellene másolnia a fájlokat, de maradjunk a leggyorsabbnál:
            
            echo "A szerver frissítése indul..."
            # Itt a szerveren lévő Docker parancsokat futtatjuk távolról