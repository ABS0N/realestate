name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y git docker.io docker-compose
            
            if [ -d "/app" ] && [ ! -d "/app/.git" ]; then rm -rf /app; fi
            if [ ! -d "/app" ]; then git clone https://github.com/ABS0N/realestate.git /app; fi
            
            cd /app
            git fetch origin
            git reset --hard origin/main
            
            # Docker Compose bűvészet: újraépíti az appot, de az adatbázist békén hagyja
            docker-compose down --remove-orphans
            docker-compose up -d --build