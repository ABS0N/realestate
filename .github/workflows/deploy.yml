name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Rendszer frissítések és Docker ellenőrzése (csendes mód)
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -y
            apt-get install -y git docker.io
            
            # 2. Projekt mappa tisztítása és letöltése
            # Ha létezik a mappa, de NEM git repó, akkor töröljük a fenébe
            if [ -d "/app" ] && [ ! -d "/app/.git" ]; then
              echo "Hibás mappa észlelve, törlés..."
              rm -rf /app
            fi
            
            # Ha még nincs ott a kód, leklónozzuk
            if [ ! -d "/app" ]; then
              echo "Projekt klónozása..."
              git clone https://github.com/ABS0N/realestate.git /app
            fi
            
            # Belépünk és frissítünk a legfrissebb állapotra
            cd /app
            git fetch origin
            git reset --hard origin/main
            
            # 3. Docker műveletek
            echo "Docker build indítása..."
            # Megállítjuk és töröljük a régi konténert, ha van
            docker stop realestate-app || true
            docker rm realestate-app || true
            
            # Felépítjük az új image-et (fontos a pont a végén!)
            docker build -t realestate-app .
            
            # Elindítjuk az alkalmazást a 80-as porton
            docker run -d --name realestate-app -p 80:8080 realestate-app
            
            echo "Sikeres élesítés!"