<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Új ingatlan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Új ingatlan rögzítése</h2>
    <form th:action="@{/properties/save}" th:object="${property}" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">Cím:</label>
            <input type="text" th:field="*{address}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ár (Ft):</label>
            <input type="number" th:field="*{price}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Alapterület (m²):</label>
            <input type="number" th:field="*{area}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Kategória:</label>
            <select th:field="*{category}" class="form-select" required>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Mentés</button>
        <a th:href="@{/properties}" class="btn btn-secondary">Mégse</a>
    </form>
</body>
</html>
