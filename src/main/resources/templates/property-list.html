<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ingatlaniroda - Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Aktuális Ingatlanok</h1>
    <a th:href="@{/properties/new}" class="btn btn-primary">Új ingatlan felvétele</a>
</div>
<table class="table table-striped">
    <thead class="table-dark">
    <tr>
        <th>Cím</th>
        <th>Alapterület (m²)</th>
        <th>Ár (Ft)</th>
        <th>Kategória</th>
        <th>Műveletek</th> <!-- EZT HOZZÁADTUK -->
    </tr>
    </thead>
    <tbody>
    <tr th:each="prop : ${properties}">
        <td th:text="${prop.address}">Cím</td>
        <td th:text="${prop.area}">0</td>
        <td th:text="${prop.price}">0</td>
        <td th:text="${prop.category != null ? prop.category.name : 'Nincs'}">Kategória</td>
        <td>
            <a th:href="@{/properties/delete/{id}(id=${prop.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Biztosan törölni szeretnéd ezt az ingatlant?')">Törlés</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
